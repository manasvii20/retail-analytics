version: "3.9"

services:
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - db_data:/data
    environment:
      - DATABASE_URL=sqlite:////data/store_intelligence.db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

volumes:
  db_data:
